server:
  port: 3000

spring:
  web:
    resources:
      cache:
        period: 0

claude:
  web:
    password-enabled: false
    claude-agent:
      host: ${CLAUDE_AGENT_HOST:127.0.0.1}
      port: ${CLAUDE_AGENT_PORT:3001}
      api-key: ${CLAUDE_AGENT_API_KEY:}
      connection-timeout: ${CLAUDE_AGENT_CONNECTION_TIMEOUT:30000}

logging:
  level:
    com.claude.web: DEBUG
    org.springframework.security: DEBUG
