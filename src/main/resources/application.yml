server:
  port: ${PORT:3000}

spring:
  application:
    name: claude-web
  web:
    resources:
      cache:
        period: 0

claude:
  web:
    password: ${CLAUDE_PASSWORD:}
    password-enabled: ${CLAUDE_PASSWORD_ENABLED:false}
    auto-approve: ${CLAUDE_AUTO_APPROVE:false}
    claude-agent:
      host: ${CLAUDE_AGENT_HOST:127.0.0.1}
      port: ${CLAUDE_AGENT_PORT:3001}
      api-key: ${CLAUDE_AGENT_API_KEY:}
      connection-timeout: ${CLAUDE_AGENT_CONNECTION_TIMEOUT:30000}

logging:
  level:
    com.claude.web: INFO
    org.springframework.security: INFO
