server:
  port: ${PORT:3000}

spring:
  web:
    resources:
      cache:
        period: 3600

claude:
  web:
    password-enabled: true
    claude-agent:
      host: ${CLAUDE_AGENT_HOST:127.0.0.1}
      port: ${CLAUDE_AGENT_PORT:8011}
      api-key: ${CLAUDE_AGENT_API_KEY:}
      connection-timeout: ${CLAUDE_AGENT_CONNECTION_TIMEOUT:30000}

logging:
  level:
    com.claude.web: WARN
    org.springframework.security: WARN
